
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小怪兽聊天</title>
    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: #1a1a2e;
            color: #eaeaea;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 动画定义 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 登录页面 */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .login-card {
            background-color: #16213e;
            padding: 32px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .login-card h1 {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 24px;
            color: #eaeaea;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background-color: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            color: #eaeaea;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #e94560;
        }

        .input-group input::placeholder {
            color: #a0a0a0;
        }

        .error-message {
            color: #e94560;
            font-size: 12px;
            margin-bottom: 16px;
            text-align: center;
            min-height: 16px;
        }

        .login-btn {
            width: 100%;
            height: 48px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            background-color: #ff5a70;
        }

        /* 聊天页面 */
        .chat-page {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .chat-page {
                max-width: 600px;
            }
        }

        .chat-header {
            background-color: #16213e;
            padding: 16px;
            border-bottom: 1px solid #2d2d44;
            flex-shrink: 0;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #eaeaea;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: calc(100vh - 140px);
        }

        .message-item {
            display: flex;
            animation: fadeInUp 0.3s ease-out;
            max-width: 75%;
        }

        .message-item.left {
            align-self: flex-start;
        }

        .message-item.right {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 100%;
            word-wrap: break-word;
        }

        .message-item.left .message-bubble {
            background-color: #2d2d44;
            border-bottom-left-radius: 4px;
        }

        .message-item.right .message-bubble {
            background-color: #0f3460;
            border-bottom-right-radius: 4px;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #a0a0a0;
        }

        .message-item.right .message-sender {
            text-align: right;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.5;
        }

        .message-time {
            font-size: 11px;
            color: #a0a0a0;
            margin-top: 4px;
            text-align: right;
        }

        .message-image {
            max-width: 200px;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .message-image:hover {
            opacity: 0.9;
        }

        .message-video-placeholder {
            width: 200px;
            height: 150px;
            background-color: #1a1a2e;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: opacity 0.2s;
        }

        .message-video-placeholder:hover {
            opacity: 0.9;
        }

        .play-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(233, 69, 96, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
            margin-left: 4px;
        }

        /* 输入区域 */
        .input-area {
            background-color: #16213e;
            padding: 8px 16px;
            border-top: 1px solid #2d2d44;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 60px;
            flex-shrink: 0;
        }

        .file-btn {
            width: 40px;
            height: 40px;
            background-color: #2d2d44;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            flex-shrink: 0;
        }

        .file-btn:hover {
            transform: scale(1.05);
            background-color: #3d3d54;
        }

        .file-btn svg {
            width: 20px;
            height: 20px;
            fill: #eaeaea;
        }

        #file-input {
            display: none;
        }

        .message-input {
            flex: 1;
            height: 44px;
            background-color: #1a1a2e;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            padding: 10px 14px;
            color: #eaeaea;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            overflow-y: auto;
        }

        .message-input:focus {
            border-color: #e94560;
        }

        .message-input::placeholder {
            color: #a0a0a0;
        }

        .send-btn {
            width: 60px;
            height: 44px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            background-color: #ff5a70;
        }

        /* 预览弹窗 */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        .preview-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .preview-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .preview-close:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .preview-download {
            position: absolute;
            bottom: 16px;
            right: 16px;
            padding: 10px 20px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .preview-download:hover {
            transform: scale(1.05);
            background-color: #ff5a70;
        }

        .preview-media {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        .preview-media video {
            max-width: 100%;
            max-height: 100%;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d2d44;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3d3d54;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <h1>小怪兽聊天</h1>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="请输入密码">
            </div>
            <div class="input-group">
                <input type="text" id="nicknameInput" placeholder="请输入昵称">
            </div>
            <div class="error-message" id="errorMessage"></div>
            <button class="login-btn" onclick="handleLogin()">进入聊天</button>
        </div>
    </div>

    <!-- 聊天页面 -->
    <div class="chat-page" id="chatPage">
        <div class="chat-header">
            <h2 id="peerName">私密聊天</h2>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">
                <svg viewBox="0 0 24 24">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
            </button>
            <input type="file" id="fileInput" accept="image/*,video/*" onchange="handleFileChange(this)">
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." onkeydown="handleKeyDown(event)"></textarea>
            <button class="send-btn" onclick="sendTextMessage()">发送</button>
        </div>
    </div>

    <!-- 预览弹窗 -->
    <div class="preview-modal" id="previewModal" onclick="closePreview(event)">
        <button class="preview-close" onclick="closePreview()">×</button>
        <div class="preview-content" onclick="event.stopPropagation()">
            <div class="preview-media" id="previewMedia"></div>
        </div>
        <button class="preview-download" onclick="downloadFile()">下载</button>
    </div>

    <script>
        // 全局状态 - 仅内存存储，刷新即丢失
        let messages = [];
        let currentUser = null;
        let currentPreview = {
            url: null,
            filename: null,
            type: null
        };

        // 实时通信相关
        let drone = null;
        let room = null;
        let roomPassword = null;
        let pendingMessages = []; // 连接建立前的待发送消息缓存
        // 公共Scaledrone频道ID，免费公共服务，无需自己搭建服务器
        const SCALEDRONE_CHANNEL_ID = '2u9YkI3yf2qfXxQ9';

        // 初始化实时连接
        function initP2P(password) {
            roomPassword = password;
            // 更新顶部状态提示
            document.getElementById('peerName').textContent = '小怪兽正在连接服务器...';

            // 初始化Scaledrone客户端，使用公共免费服务
            drone = new Scaledrone(SCALEDRONE_CHANNEL_ID);

            drone.on('open', function(error) {
                if (error) {
                    document.getElementById('peerName').textContent = '连接失败，小怪兽迷路了: ' + error;
                    return;
                }

                document.getElementById('peerName').textContent = '小怪兽正在加入房间...';
                // 加入以密码为名的私有房间，只有输入相同密码的人才能进入
                room = drone.subscribe('room-' + password);

                room.on('open', function() {
                    document.getElementById('peerName').textContent = '已加入，等待另一只小怪兽...';
                    console.log('Joined room: room-' + password);
                });

                // 监听房间内的消息
                room.on('message', function(message) {
                    // 忽略自己发送的消息
                    if (message.clientId === drone.clientId) {
                        return;
                    }

                    let data = message.data;
                    // 如果是媒体消息，本地创建Blob URL
                    if (data.type === 'image' || data.type === 'video') {
                        const blob = new Blob([data.arrayBuffer], { type: data.fileType });
                        data.url = URL.createObjectURL(blob);
                    }
                    messages.push(data);
                    renderMessages();

                    // 更新顶部昵称
                    document.getElementById('peerName').textContent = '两只小怪兽已连线，开始聊天吧！';
                });

                room.on('members', function(members) {
                    if (members.length >= 2) {
                        document.getElementById('peerName').textContent = '两只小怪兽已连线，开始聊天吧！';
                        // 连接成功，发送缓存的消息
                        if (pendingMessages.length > 0) {
                            pendingMessages.forEach(msg => {
                                drone.publish({
                                    room: 'room-' + roomPassword,
                                    message: msg
                                });
                            });
                            pendingMessages = [];
                        }
                    }
                });
            });

            drone.on('error', function(error) {
                document.getElementById('peerName').textContent = '连接失败，小怪兽迷路了: ' + error.message;
            });

            drone.on('close', function() {
                document.getElementById('peerName').textContent = '小怪兽的连接断开了...';
            });
        }

        // 补零函数
        function pad(n) {
            return n.toString().padStart(2, '0');
        }

        // 格式化时间
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        // 登录处理
        function handleLogin() {
            const password = document.getElementById('passwordInput').value;
            const nickname = document.getElementById('nicknameInput').value.trim();
            const errorEl = document.getElementById('errorMessage');

            // 验证密码
            if (password !== 'sunmoonsakura') {
                errorEl.textContent = '密码错误，请重新输入';
                return;
            }

            // 验证昵称
            if (nickname.length < 2) {
                errorEl.textContent = '昵称至少需要2个字符';
                return;
            }

            // 登录成功
            currentUser = nickname;
            
            // 切换页面
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('chatPage').style.display = 'flex';

            // 初始化P2P连接
            initP2P(password);

            // 渲染初始消息
            renderMessages();
        }

        // 键盘事件处理 - Enter发送，Shift+Enter换行
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendTextMessage();
            }
        }

        // 发送文本消息
        function sendTextMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content) return;

            // 创建消息
            const message = {
                sender: currentUser,
                type: 'text',
                content: content,
                timestamp: Date.now()
            };

            messages.push(message);
            // 如果已连接，直接发送；否则缓存到待发送列表
            if (drone && room && drone.readyState === 'open') {
                drone.publish({
                    room: 'room-' + roomPassword,
                    message: message
                });
            } else {
                pendingMessages.push(message);
            }
            input.value = '';
            renderMessages();
        }

        // 文件选择处理
        function handleFileChange(input) {
            const file = input.files[0];
            if (!file) return;

            let type = null;
            if (file.type.startsWith('image/')) {
                type = 'image';
            } else if (file.type.startsWith('video/')) {
                type = 'video';
            } else {
                alert('不支持的文件类型，请选择图片或视频');
                input.value = '';
                return;
            }

            // 读取文件为ArrayBuffer，用于跨标签页传输
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                // 本地创建Blob和URL用于当前页面显示
                const blob = new Blob([arrayBuffer], { type: file.type });
                const url = URL.createObjectURL(blob);

                // 创建消息
                const message = {
                    sender: currentUser,
                    type: type,
                    url: url,
                    filename: file.name,
                    fileType: file.type,
                    arrayBuffer: arrayBuffer, // 原始文件数据，用于跨标签页同步
                    timestamp: Date.now()
                };

                messages.push(message);
                // 如果已连接，直接发送；否则缓存到待发送列表
                if (drone && room && drone.readyState === 'open') {
                    drone.publish({
                        room: 'room-' + roomPassword,
                        message: message
                    });
                } else {
                    pendingMessages.push(message);
                }
                input.value = '';
                renderMessages();
            };
            reader.readAsArrayBuffer(file);
        }

        // 渲染消息列表
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            let peerName = '私密聊天';

            messages.forEach(msg => {
                const isOwn = msg.sender === currentUser;
                const item = document.createElement('div');
                item.className = `message-item ${isOwn ? 'right' : 'left'}`;

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';

                // 发送者昵称
                const senderEl = document.createElement('div');
                senderEl.className = 'message-sender';
                senderEl.textContent = msg.sender;
                bubble.appendChild(senderEl);

                // 内容
                const contentEl = document.createElement('div');
                contentEl.className = 'message-content';

                if (msg.type === 'text') {
                    contentEl.textContent = msg.content;
                } else if (msg.type === 'image') {
                    const img = document.createElement('img');
                    img.src = msg.url;
                    img.className = 'message-image';
                    img.onclick = () => openPreview(msg.url, msg.filename, 'image');
                    contentEl.appendChild(img);
                } else if (msg.type === 'video') {
                    const placeholder = document.createElement('div');
                    placeholder.className = 'message-video-placeholder';
                    placeholder.innerHTML = `
                        <div class="play-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>
                    `;
                    placeholder.onclick = () => openPreview(msg.url, msg.filename, 'video');
                    contentEl.appendChild(placeholder);
                }

                bubble.appendChild(contentEl);

                // 时间
                const timeEl = document.createElement('div');
                timeEl.className = 'message-time';
                timeEl.textContent = formatTime(msg.timestamp);
                bubble.appendChild(timeEl);

                item.appendChild(bubble);
                container.appendChild(item);

                // 更新对方昵称
                if (!isOwn) {
                    peerName = msg.sender;
                }
            });

            // 更新顶部昵称，默认显示小怪兽聊天
            document.getElementById('peerName').textContent = peerName || '小怪兽聊天';

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        // 打开预览
        function openPreview(url, filename, type) {
            currentPreview.url = url;
            currentPreview.filename = filename;
            currentPreview.type = type;

            const mediaContainer = document.getElementById('previewMedia');
            mediaContainer.innerHTML = '';

            if (type === 'image') {
                const img = document.createElement('img');
                img.src = url;
                img.style.maxWidth = '100%';
                img.style.maxHeight = '100%';
                img.style.borderRadius = '8px';
                mediaContainer.appendChild(img);
            } else if (type === 'video') {
                const video = document.createElement('video');
                video.src = url;
                video.controls = true;
                video.autoplay = true;
                video.style.maxWidth = '100%';
                video.style.maxHeight = '100%';
                video.style.borderRadius = '8px';
                mediaContainer.appendChild(video);
            }

            document.getElementById('previewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        // 关闭预览
        function closePreview(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('previewModal').style.display = 'none';
            document.body.style.overflow = '';
            currentPreview = { url: null, filename: null, type: null };
        }

        // 下载文件
        function downloadFile() {
            if (!currentPreview.url) return;

            const a = document.createElement('a');
            a.href = currentPreview.url;
            a.download = currentPreview.filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
